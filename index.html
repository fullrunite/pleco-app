<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Groupe Pléco</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --sky:#4DD9F0;--navy:#1B3A6B;--cream:#FFF8F0;--yellow:#FFD84D;--orange:#FF8C42;
  --green:#4ECB71;--purple:#9B6DFF;--red:#FF5A5A;--muted:#7A9CBF;--bg:#F0F9FF;
}
body{font-family:"Nunito",sans-serif;background:var(--bg);color:var(--navy);min-height:100vh;}
.header{background:var(--navy);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:64px;border-bottom:4px solid var(--sky);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 22px;border-radius:50px;border:3px solid var(--navy);font-family:"Nunito",sans-serif;font-weight:900;font-size:14px;cursor:pointer;transition:all 0.12s;box-shadow:4px 4px 0 var(--navy);}
.btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--navy);}
.btn-sky{background:var(--sky);color:var(--navy);}
.btn-green{background:var(--green);color:#fff;}
.btn-red{background:var(--red);color:#fff;}
.btn-yellow{background:var(--yellow);color:var(--navy);}
.btn-white{background:#fff;color:var(--navy);}
.btn-outline{background:transparent;color:var(--navy);}
.btn-sm{padding:7px 14px;font-size:12px;box-shadow:3px 3px 0 var(--navy);}
.btn-sm:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--navy);}
.input{width:100%;padding:12px 16px;border-radius:16px;border:3px solid var(--navy);background:#fff;font-size:15px;font-family:"Nunito",sans-serif;font-weight:700;box-shadow:4px 4px 0 var(--navy);}
.input:focus{outline:none;border-color:var(--sky);box-shadow:4px 4px 0 var(--sky);}
.label{font-size:12px;font-weight:900;color:var(--navy);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:0.07em;}
.card{background:#fff;border-radius:20px;padding:20px;border:3px solid var(--navy);box-shadow:6px 6px 0 var(--navy);}
.metric{background:#fff;border-radius:18px;padding:14px 10px;border:3px solid var(--navy);box-shadow:5px 5px 0 var(--navy);text-align:center;}
.metric-val{font-family:"Fredoka One",cursive;font-size:28px;color:var(--navy);line-height:1;}
.metric-lbl{font-size:9px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:4px;}
.metric-sub{font-size:10px;color:var(--sky);font-weight:800;margin-top:3px;}
.tab-bar{display:flex;gap:5px;background:var(--cream);border-radius:50px;padding:5px;border:3px solid var(--navy);margin-bottom:1.5rem;box-shadow:4px 4px 0 var(--navy);}
.tab{flex:1;padding:8px 4px;border-radius:50px;border:none;background:transparent;color:var(--muted);font-size:11px;font-family:"Nunito",sans-serif;font-weight:900;cursor:pointer;transition:all 0.15s;text-transform:uppercase;}
.tab.active{background:var(--navy);color:#fff;}
.progress-track{height:14px;background:var(--cream);border-radius:99px;overflow:hidden;border:2px solid var(--navy);}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--sky),var(--green));transition:width 0.8s;}
.svc-card{background:#fff;border-radius:20px;overflow:hidden;cursor:pointer;border:3px solid var(--navy);box-shadow:5px 5px 0 var(--navy);transition:all 0.15s;}
.svc-card:hover{transform:translate(-2px,-2px);box-shadow:7px 7px 0 var(--navy);}
.svc-card.sel{border-color:var(--sky);box-shadow:5px 5px 0 var(--sky);background:#f0fcff;}
.rank-row{background:#fff;border-radius:16px;padding:14px 16px;border:3px solid var(--navy);display:flex;align-items:center;gap:12px;box-shadow:4px 4px 0 var(--navy);}
.order-row{background:#fff;border-radius:16px;border:3px solid var(--navy);overflow:hidden;box-shadow:4px 4px 0 var(--navy);}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 14px;background:var(--cream);border-top:2px solid var(--navy);}
.dl{font-size:10px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;}
.dv{font-size:14px;font-weight:800;color:var(--navy);margin-top:3px;}
.flash{position:fixed;top:0;left:0;right:0;padding:14px;font-size:14px;font-weight:900;text-align:center;z-index:9999;font-family:"Nunito",sans-serif;display:none;border-bottom:4px solid var(--navy);}
.stitle{font-family:"Fredoka One",cursive;font-size:16px;color:var(--navy);margin-bottom:14px;}
.page{max-width:580px;margin:0 auto;padding:1.5rem 1rem 3rem;}
.page-wide{max-width:720px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.pill{display:inline-block;padding:4px 12px;border-radius:99px;font-size:11px;font-weight:900;border:2px solid var(--navy);}
.pill-sky{background:var(--sky);color:var(--navy);}
.pill-green{background:var(--green);color:#fff;}
.pill-yellow{background:var(--yellow);color:var(--navy);}
.upill{background:var(--sky);color:var(--navy);font-size:12px;font-weight:900;padding:5px 14px;border-radius:99px;border:2px solid var(--navy);}
.pzone{border:3px dashed var(--navy);border-radius:16px;padding:18px;text-align:center;background:#f8fcff;position:relative;overflow:hidden;}
.pzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.ppreview{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.ppreview img{width:78px;height:78px;object-fit:cover;border-radius:10px;border:3px solid var(--navy);cursor:zoom-in;}
.bbadge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:10px;font-weight:900;border:2px solid var(--navy);}
.bbadge.pend{background:#f0f0f0;color:var(--muted);}
.bbadge.ok{background:var(--green);color:#fff;}
.cc{background:#fff;border-radius:16px;border:3px solid var(--navy);overflow:hidden;box-shadow:4px 4px 0 var(--navy);margin-bottom:12px;}
.cc-head{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
.cc-head:hover{background:#f8f8f8;}
.cc-body{padding:14px 16px 16px;border-top:2px dashed #D0E8F0;}
.etab-bar{display:flex;background:var(--cream);border-radius:50px;padding:5px;border:3px solid var(--navy);margin-bottom:1.5rem;box-shadow:4px 4px 0 var(--navy);}
.etab{flex:1;padding:10px 6px;border-radius:50px;border:none;background:transparent;color:var(--muted);font-size:13px;font-family:"Nunito",sans-serif;font-weight:900;cursor:pointer;transition:all 0.15s;}
.etab.active{background:var(--navy);color:#fff;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal{background:#fff;border-radius:20px;padding:24px;border:3px solid var(--navy);box-shadow:8px 8px 0 var(--navy);width:100%;max-width:400px;}
.lb{position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;}
.bar-chart{display:flex;align-items:flex-end;gap:10px;height:110px;}
.bw{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;}
.bc{width:100%;border-radius:8px 8px 0 0;min-height:4px;border:2px solid var(--navy);}
.bl{font-size:10px;font-weight:900;color:var(--muted);text-align:center;line-height:1.2;}
.bv{font-size:13px;font-weight:900;color:var(--navy);}
.confirm-bg{position:fixed;inset:0;background:rgba(27,58,107,0.55);z-index:3000;display:flex;align-items:center;justify-content:center;padding:1.5rem;backdrop-filter:blur(3px);}
.confirm-box{background:#fff;border-radius:22px;padding:28px 24px 22px;border:3px solid var(--navy);box-shadow:8px 8px 0 var(--navy);width:100%;max-width:360px;text-align:center;}
.confirm-icon{font-size:42px;margin-bottom:10px;}
.confirm-title{font-family:"Fredoka One",cursive;font-size:20px;color:var(--navy);margin-bottom:8px;}
.confirm-msg{font-size:14px;font-weight:700;color:var(--muted);margin-bottom:22px;line-height:1.5;}
.confirm-actions{display:flex;gap:10px;}
.confirm-actions .btn{flex:1;}
.sync-dot{width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--navy);display:inline-block;margin-right:6px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;}
.spinner{width:48px;height:48px;border:5px solid var(--cream);border-top-color:var(--sky);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="flash" class="flash"></div>
<div id="root">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div style="font-family:Fredoka One,cursive;font-size:22px;color:var(--sky);">Groupe Pléco</div>
    <div style="font-size:14px;font-weight:700;color:var(--muted);">Connexion à la base de données...</div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ═══════════════════════════════════
// CONFIGURATION FIREBASE
// ═══════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyAVR59siWkvihkv7SSwSOZgkGy_sc7j0io",
  authDomain: "app-employer.firebaseapp.com",
  projectId: "app-employer",
  storageBucket: "app-employer.firebasestorage.app",
  messagingSenderId: "914673503807",
  appId: "1:914673503807:web:4a3774ebe7df57fd61f28a"
};

const fireApp = initializeApp(firebaseConfig);
const fireDb = getFirestore(fireApp);
const DB_DOC = doc(fireDb, "pleco", "main");

// ═══════════════════════════════════
// DONNÉES & CONSTANTES
// ═══════════════════════════════════
const APW = "pleco2024";

const SV = [
  {id:"m1", label:"Maison 1 étage",      type:"Résidentiel",  commission:90,  color:"#4DD9F0"},
  {id:"m2", label:"Maison 2 étages",     type:"Résidentiel",  commission:140, color:"#9B6DFF"},
  {id:"lead",label:"Lead réseau social", type:"Marketing",    commission:35,  color:"#FF6B9D"},
  {id:"up", label:"Upsell abonnement",   type:"Fidélisation", commission:75,  color:"#FF8C42"},
];
const ST = [
  {id:"m1", label:"Maison 1 étage",  base:70},
  {id:"m2", label:"Maison 2 étages", base:130},
];

// ═══════════════════════════════════
// BASE DE DONNÉES PARTAGÉE
// ═══════════════════════════════════
let db = {employees:[], sales:[], clients:[]};
let dbReady = false;

async function saveDB(){
  try {
    // Vérifie la taille approximative des données avant d'envoyer
    const payload = {
      employees: db.employees,
      sales: db.sales,
      clients: db.clients,
      updatedAt: Date.now()
    };
    const size = JSON.stringify(payload).length;
    if(size > 900000){
      flash("⚠️ Données trop lourdes — réduis le nombre de photos","#FF5A5A");
      return false;
    }
    await setDoc(DB_DOC, payload);
    return true;
  } catch(e) {
    flash("⚠️ Erreur de sauvegarde !","#FF5A5A");
    console.error(e);
    return false;
  }
}

// Écoute les changements en temps réel (toutes les app connectées voient les mises à jour)
onSnapshot(DB_DOC, (snap) => {
  if(snap.exists()){
    const data = snap.data();
    db.employees = data.employees || [];
    db.sales     = data.sales     || [];
    db.clients   = data.clients   || [];
  } else {
    db = {employees:[], sales:[], clients:[]};
  }
  if(!dbReady){
    dbReady = true;
    render();
  } else {
    // Mise à jour en temps réel — re-render si connecté
    if(sess) render();
  }
});

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let sess = null;
let flashTimer = null;
let pendingSvc = null;
let expandedId = null;
let adminTab = "board";
let empTab = "vendeur";
let salesFilter = "all";
let clientsFilter = "all";

// ═══════════════════════════════════
// UTILS
// ═══════════════════════════════════
function getWeekKey(date){
  const d = new Date(date||Date.now());
  d.setHours(0,0,0,0);
  const day = d.getDay();
  const diff = d.getDate() - day + (day===0 ? -6 : 1);
  const mon = new Date(d);
  mon.setDate(diff);
  return mon.getFullYear()+"-"+(mon.getMonth()+1)+"-"+mon.getDate();
}

function calcBonus(n){ return n>=20 ? 500 : n>=10 ? 200 : 0; }

function empWeekStats(empId, weekKey){
  const sales = db.sales.filter(s => s.eid===empId && s.wk===weekKey);
  const comm = sales.reduce((t,s)=>{ const v=SV.find(x=>x.id===s.sid); return t+(v?v.commission:0); }, 0);
  const bonus = calcBonus(sales.length);
  return { n:sales.length, comm, bonus, total:comm+bonus };
}

function clientPay(c){
  const sv = ST.find(x=>x.id===c.svcId);
  const base = sv ? sv.base : 0;
  const br = (c.bonusRapport && c.bonusRapportOK) ? 20 : 0;
  const ba = (c.bonusAvis && c.bonusAvisOK) ? 20 : 0;
  return base + br + ba;
}

function flash(msg, color){
  const el = document.getElementById("flash");
  el.textContent = msg;
  el.style.background = color || "#4DD9F0";
  el.style.color = "#1B3A6B";
  el.style.display = "block";
  if(flashTimer) clearTimeout(flashTimer);
  flashTimer = setTimeout(()=>{ el.style.display="none"; }, 2800);
}

function confirmModal(opts){
  const bg = document.createElement("div");
  bg.className = "confirm-bg";
  bg.innerHTML =
    '<div class="confirm-box">' +
    '<div class="confirm-icon">'+( opts.icon||"🗑")+'</div>' +
    '<div class="confirm-title">'+(opts.title||"Confirmer")+'</div>' +
    '<div class="confirm-msg">'+(opts.msg||"Cette action est irréversible.")+'</div>' +
    '<div class="confirm-actions">' +
    '<button class="btn btn-outline" id="cm-cancel">Annuler</button>' +
    '<button class="btn '+(opts.confirmClass||"btn-red")+'" id="cm-ok">'+(opts.confirmLabel||"Supprimer")+'</button>' +
    '</div></div>';
  document.body.appendChild(bg);
  bg.querySelector("#cm-cancel").onclick = () => bg.remove();
  bg.querySelector("#cm-ok").onclick = () => { bg.remove(); opts.onConfirm(); };
  bg.onclick = e => { if(e.target===bg) bg.remove(); };
}

function header(label){
  return `<div class="header">
    <span style="font-family:Fredoka One,cursive;font-size:22px;color:var(--sky);">Groupe Pléco</span>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="sync-dot" title="Synchronisé en temps réel"></span>
      ${label ? `<span class="upill">${label}</span>` : ""}
      <button class="btn btn-white btn-sm" id="btn-logout">Quitter</button>
    </div>
  </div>`;
}

// ═══════════════════════════════════
// SVG ILLUSTRATIONS
// ═══════════════════════════════════
function svgM1(w,h){ return `<svg viewBox="0 0 200 130" width="${w||200}" height="${h||130}" xmlns="http://www.w3.org/2000/svg"><rect width="200" height="130" fill="#E8FAFE"/><rect x="0" y="110" width="200" height="20" fill="#4ECB71" opacity="0.5"/><rect x="28" y="58" width="144" height="54" rx="6" fill="#fff" stroke="#1B3A6B" stroke-width="3"/><line x1="28" y1="72" x2="172" y2="72" stroke="#D0E8F0" stroke-width="2"/><line x1="28" y1="86" x2="172" y2="86" stroke="#D0E8F0" stroke-width="2"/><polygon points="16,60 100,10 184,60" fill="#4DD9F0" stroke="#1B3A6B" stroke-width="3"/><rect x="82" y="80" width="36" height="32" rx="4" fill="#1B3A6B"/><rect x="86" y="84" width="12" height="15" rx="2" fill="#4DD9F0" opacity="0.5"/><rect x="102" y="84" width="12" height="15" rx="2" fill="#4DD9F0" opacity="0.5"/></svg>`; }
function svgM2(w,h){ return `<svg viewBox="0 0 200 130" width="${w||200}" height="${h||130}" xmlns="http://www.w3.org/2000/svg"><rect width="200" height="130" fill="#F3EEFF"/><rect x="0" y="110" width="200" height="20" fill="#4ECB71" opacity="0.5"/><rect x="33" y="34" width="134" height="36" rx="4" fill="#fff" stroke="#1B3A6B" stroke-width="3"/><rect x="82" y="58" width="36" height="12" rx="2" fill="#E8E0FF" stroke="#1B3A6B" stroke-width="2"/><rect x="23" y="68" width="154" height="44" rx="4" fill="#fff" stroke="#1B3A6B" stroke-width="3"/><polygon points="20,36 100,4 180,36" fill="#9B6DFF" stroke="#1B3A6B" stroke-width="3"/><rect x="82" y="80" width="36" height="32" rx="4" fill="#1B3A6B"/><rect x="85" y="83" width="13" height="15" rx="2" fill="#9B6DFF" opacity="0.5"/><rect x="102" y="83" width="13" height="15" rx="2" fill="#9B6DFF" opacity="0.5"/></svg>`; }
function svgLead(w,h){ return `<svg viewBox="0 0 200 130" width="${w||200}" height="${h||130}" xmlns="http://www.w3.org/2000/svg"><rect width="200" height="130" fill="#FFF0F7"/><rect x="68" y="12" width="64" height="102" rx="12" fill="#FF6B9D" stroke="#1B3A6B" stroke-width="3"/><rect x="72" y="20" width="56" height="78" rx="6" fill="#fff" stroke="#1B3A6B" stroke-width="2"/><rect x="76" y="24" width="48" height="12" rx="4" fill="#FF6B9D"/><rect x="76" y="48" width="48" height="26" rx="4" fill="#FFF0F7" stroke="#1B3A6B" stroke-width="1.5"/><circle cx="150" cy="34" r="16" fill="#FF6B9D" opacity="0.15" stroke="#FF6B9D" stroke-width="2"/><text x="144" y="39" font-family="Nunito,sans-serif" font-weight="900" font-size="12" fill="#FF6B9D">+5</text></svg>`; }
function svgUp(w,h){ return `<svg viewBox="0 0 200 130" width="${w||200}" height="${h||130}" xmlns="http://www.w3.org/2000/svg"><rect width="200" height="130" fill="#FFF4EC"/><line x1="20" y1="112" x2="168" y2="112" stroke="#1B3A6B" stroke-width="2.5"/><line x1="20" y1="18" x2="20" y2="112" stroke="#1B3A6B" stroke-width="2.5"/><rect x="24" y="94" width="22" height="18" rx="4" fill="#FF8C42" opacity="0.3" stroke="#1B3A6B" stroke-width="2"/><rect x="52" y="76" width="22" height="36" rx="4" fill="#FF8C42" opacity="0.5" stroke="#1B3A6B" stroke-width="2"/><rect x="80" y="58" width="22" height="54" rx="4" fill="#FF8C42" opacity="0.7" stroke="#1B3A6B" stroke-width="2"/><rect x="108" y="38" width="22" height="74" rx="4" fill="#FF8C42" opacity="0.85" stroke="#1B3A6B" stroke-width="2"/><rect x="136" y="20" width="22" height="92" rx="4" fill="#FF8C42" stroke="#1B3A6B" stroke-width="2"/><polyline points="35,94 63,76 91,58 119,38 147,20" stroke="#FFD84D" stroke-width="3" fill="none" stroke-linecap="round"/></svg>`; }
function getSvg(svcId, w, h){
  if(svcId==="m1") return svgM1(w,h);
  if(svcId==="m2") return svgM2(w,h);
  if(svcId==="lead") return svgLead(w,h);
  if(svcId==="up") return svgUp(w,h);
  return `<svg width="${w||48}" height="${h||48}" viewBox="0 0 48 48"><rect width="48" height="48" fill="#E8FAFE"/></svg>`;
}

// ═══════════════════════════════════
// RENDER PRINCIPAL
// ═══════════════════════════════════
function render(){
  if(!sess) { renderLogin(); return; }
  if(sess.role==="admin") renderAdmin();
  else renderEmp();
}

// ═══════════════════════════════════
// LOGIN
// ═══════════════════════════════════
function renderLogin(){
  const root = document.getElementById("root");
  root.innerHTML = `
  <div class="header" style="justify-content:center;">
    <span style="font-family:Fredoka One,cursive;font-size:24px;color:var(--sky);">Groupe Pléco</span>
  </div>
  <div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 68px);padding:2rem 1.25rem;">
    <div style="width:100%;max-width:400px;">
      <div style="text-align:center;margin-bottom:2rem;">
        <div style="font-family:Fredoka One,cursive;font-size:44px;color:var(--sky);">Groupe Pléco</div>
        <div style="font-family:Fredoka One,cursive;font-size:17px;color:var(--navy);margin-top:6px;">Portail des Équipes</div>
        <div style="font-size:13px;color:var(--muted);margin-top:4px;font-weight:700;">Nettoyage extérieur tout inclus</div>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:1.25rem;">
        <button class="btn btn-sky" style="flex:1;" id="btn-show-emp">👷 Employé</button>
        <button class="btn btn-outline" style="flex:1;" id="btn-show-admin">🔐 Admin</button>
      </div>
      <div id="login-form"></div>

function previewFiles(type){
  const input = document.getElementById("files-"+type);
  const prev = document.getElementById("prev-"+type);
  if(!input||!prev) return;
  prev.innerHTML = "";
  Array.from(input.files).slice(0,4).forEach(f=>{
    const r = new FileReader();
    r.onload = e => { const img=document.createElement("img"); img.src=e.target.result; prev.appendChild(img); };
    r.readAsDataURL(f);
  });
}

// Compresse une image en base64 réduite pour rester sous la limite Firestore
function compressImage(file, maxW, quality){
  return new Promise(resolve=>{
    const r = new FileReader();
    r.onload = ev=>{
      const img = new Image();
      img.onload = ()=>{
        const canvas = document.createElement("canvas");
        let w = img.width, h = img.height;
        if(w > maxW){ h = Math.round(h * maxW / w); w = maxW; }
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality||0.5));
      };
      img.src = ev.target.result;
    };
    r.readAsDataURL(file);
  });
}

async function doSubmitClient(){
  const name = document.getElementById("inp-cn")?.value.trim();
  const addr = document.getElementById("inp-ca")?.value.trim();
  const svcId = document.getElementById("inp-csvc")?.value;
  if(!name){ flash("Saisis le nom du client !","#FF5A5A"); return; }
  if(!addr){ flash("Saisis l'adresse !","#FF5A5A"); return; }
  if(!svcId){ flash("Sélectionne le type de maison !","#FFD84D"); return; }

  // Désactive le bouton pendant la soumission
  const btn = document.getElementById("btn-submit-client");
  if(btn){ btn.disabled=true; btn.textContent="⏳ Enregistrement..."; }

  const sv = ST.find(x=>x.id===svcId);
  const client = {
    id: Date.now().toString(),
    eid: sess.emp.id, empName: sess.emp.name,
    clientName: name, address: addr,
    svcId, svcLabel: sv ? sv.label : "",
    date: new Date().toISOString(), wk: getWeekKey(),
    beforePhotos:[], afterPhotos:[],
    bonusRapport:false, bonusRapportOK:false,
    bonusAvis:false, bonusAvisOK:false
  };

  const bfFiles = Array.from(document.getElementById("files-before")?.files||[]).slice(0,4);
  const afFiles = Array.from(document.getElementById("files-after")?.files||[]).slice(0,4);

  try {
    // Compresse fort (max 480px, qualité 30%) pour que 4+4 photos rentrent sous la limite Firestore 1MB
    for(const f of bfFiles){
      const compressed = await compressImage(f, 480, 0.30);
      client.beforePhotos.push(compressed);
    }
    for(const f of afFiles){
      const compressed = await compressImage(f, 480, 0.30);
      client.afterPhotos.push(compressed);
    }
    client.bonusRapport = client.afterPhotos.length > 0;
    db.clients.push(client);
    await saveDB();
    flash("✅ Travail chez "+name+" enregistré !");
    renderTech();
  } catch(err) {
    console.error(err);
    flash("⚠️ Erreur — réessaie sans photos ou avec moins de photos","#FF5A5A");
    if(btn){ btn.disabled=false; btn.textContent="✅ Soumettre le travail"; }
  }
}

// Délégation d'événements pour les cartes clients
document.addEventListener("click", function(e){
  const lbImg = e.target.closest("[data-lb-cid]");
  if(lbImg){
    e.stopPropagation();
    openLightbox(lbImg.dataset.lbCid, lbImg.dataset.lbType, parseInt(lbImg.dataset.lbIdx));
    return;
  }
  const actionBtn = e.target.closest(".client-action-btn");
  if(actionBtn){
    e.stopPropagation();
    const action = actionBtn.dataset.action;
    const cid = actionBtn.dataset.cid;
    if(action==="delclient") doDeleteClient(cid);
    else if(action==="valrap") doValidateBonus(cid,"rapport");
    else if(action==="valavis") doValidateBonus(cid,"avis");
    else if(action==="grantavis") doGrantAvis(cid);
    return;
  }
  const toggleHead = e.target.closest(".toggle-client");
  if(toggleHead){
    const cid = toggleHead.dataset.cid;
    expandedId = expandedId===cid ? null : cid;
    render();
    return;
  }
  if(e.target.id==="btn-logout"){ doLogout(); return; }
});

function doDeleteClient(id){
  const c = db.clients.find(x=>x.id===id);
  const name = c ? c.clientName : "ce travail";
  confirmModal({
    icon:"🗑", title:"Supprimer le travail ?",
    msg:`Le travail de <b>${name}</b> sera définitivement supprimé.`,
    confirmLabel:"Oui, supprimer", confirmClass:"btn-red",
    onConfirm: async () => {
      db.clients = db.clients.filter(c=>c.id!==id);
      await saveDB();
      if(expandedId===id) expandedId = null;
      flash("Travail supprimé","#FF5A5A");
      render();
    }
  });
}

async function doValidateBonus(id, type){
  const c = db.clients.find(x=>x.id===id);
  if(!c) return;
  if(type==="rapport") c.bonusRapportOK = true;
  if(type==="avis") c.bonusAvisOK = true;
  await saveDB();
  flash("Bonus validé pour "+c.clientName+" !","#4ECB71");
  render();
}

async function doGrantAvis(id){
  const c = db.clients.find(x=>x.id===id);
  if(!c) return;
  c.bonusAvis = true; c.bonusAvisOK = false;
  await saveDB();
  flash("Avis 5 étoiles accordé !","#FFD84D");
  render();
}

// ─── LIGHTBOX ───
function openLightbox(clientId, type, idx){
  const c = db.clients.find(x=>x.id===clientId);
  if(!c) return;
  const photos = type==="b" ? c.beforePhotos : c.afterPhotos;
  if(!photos||!photos.length) return;
  let cur = idx||0;
  const lb = document.createElement("div");
  lb.className = "lb"; lb.id = "lightbox";
  function draw(){
    lb.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;">
      ${photos.length>1 ? `<button id="lb-prev" style="background:rgba(255,255,255,0.2);border:2px solid #fff;color:#fff;font-size:30px;width:48px;height:48px;border-radius:50%;cursor:pointer;flex-shrink:0;">‹</button>` : ""}
      <img src="${photos[cur]}" style="max-width:82vw;max-height:70vh;border-radius:12px;border:3px solid var(--sky);object-fit:contain;display:block;"/>
      ${photos.length>1 ? `<button id="lb-next" style="background:rgba(255,255,255,0.2);border:2px solid #fff;color:#fff;font-size:30px;width:48px;height:48px;border-radius:50%;cursor:pointer;flex-shrink:0;">›</button>` : ""}
    </div>
    <div style="margin-top:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center;">
      <span style="color:#fff;font-family:Nunito,sans-serif;font-weight:800;font-size:13px;">Photo ${cur+1} / ${photos.length}</span>
      <a href="${photos[cur]}" download="pleco-photo-${cur+1}.png" style="background:var(--sky);color:var(--navy);padding:7px 16px;border-radius:50px;font-family:Nunito,sans-serif;font-weight:900;font-size:12px;text-decoration:none;border:2px solid var(--navy);">⬇ Télécharger</a>
      <button id="lb-close" style="background:var(--red);color:#fff;padding:7px 16px;border-radius:50px;font-family:Nunito,sans-serif;font-weight:900;font-size:12px;border:2px solid var(--navy);cursor:pointer;">✕ Fermer</button>
    </div>`;
    document.getElementById("lb-close").onclick = () => { lb.remove(); document.onkeydown=null; };
    if(document.getElementById("lb-prev")) document.getElementById("lb-prev").onclick = () => { cur=(cur-1+photos.length)%photos.length; draw(); };
    if(document.getElementById("lb-next")) document.getElementById("lb-next").onclick = () => { cur=(cur+1)%photos.length; draw(); };
  }
  lb.onclick = e => { if(e.target===lb){ lb.remove(); document.onkeydown=null; } };
  document.onkeydown = e => {
    if(e.key==="Escape"){ lb.remove(); document.onkeydown=null; }
    if(e.key==="ArrowLeft") { cur=(cur-1+photos.length)%photos.length; draw(); }
    if(e.key==="ArrowRight") { cur=(cur+1)%photos.length; draw(); }
  };
  document.body.appendChild(lb);
  draw();
}

    if(remBtn){
      const id = remBtn.dataset.eid;
      const emp = db.employees.find(e=>e.id===id);
      const name = emp ? emp.name : "cet employé";
      const nSales = db.sales.filter(s=>s.eid===id).length;
      const nClients = db.clients.filter(c=>c.eid===id).length;
      confirmModal({
        icon:"👷", title:"Retirer "+name+" ?",
        msg:`Ses <b>${nSales} vente${nSales!==1?"s":""}</b> et <b>${nClients} travail${nClients!==1?"x":""}</b> seront également supprimés.`,
        confirmLabel:"Oui, retirer", confirmClass:"btn-red",
        onConfirm: async () => {
          db.employees = db.employees.filter(e=>e.id!==id);
          db.sales     = db.sales.filter(s=>s.eid!==id);
          db.clients   = db.clients.filter(c=>c.eid!==id);
          await saveDB();
          flash(name+" retiré de l'équipe","#FF5A5A");
          renderTeam();
        }
      });
      return;
    }
    const pwBtn = e.target.closest(".edit-pw-btn");
    if(pwBtn){
      const id = pwBtn.dataset.eid;
      const emp = db.employees.find(e=>e.id===id);
      if(!emp) return;
      const modal = document.createElement("div");
      modal.className = "modal-bg";
      modal.innerHTML =
        '<div class="modal">' +
        '<div style="font-family:Fredoka One,cursive;font-size:18px;margin-bottom:16px;">Changer le mot de passe</div>' +
        '<div style="font-weight:800;margin-bottom:14px;">'+emp.name+'</div>' +
        '<div style="margin-bottom:14px;"><span class="label">Nouveau mot de passe</span>' +
        '<input class="input" id="inp-new-mpw" type="password" placeholder="nouveau mot de passe"/></div>' +
        '<div style="display:flex;gap:10px;">' +
        '<button class="btn btn-outline" style="flex:1;" id="btn-cancel-pw">Annuler</button>' +
        '<button class="btn btn-sky" style="flex:2;" id="btn-save-pw">Sauvegarder</button>' +
        '</div></div>';
      document.body.appendChild(modal);
      setTimeout(()=>{ document.getElementById("inp-new-mpw").focus(); }, 50);
      document.getElementById("btn-cancel-pw").onclick = () => modal.remove();
      document.getElementById("btn-save-pw").onclick = async () => {
        const pw = document.getElementById("inp-new-mpw").value;
        if(!pw||pw.length<3){ flash("Mot de passe trop court !","#FFD84D"); return; }
        emp.password = pw;
        await saveDB();
        modal.remove();
        flash("Mot de passe mis à jour !","#4ECB71");
      };
      return;
    }
  });
}

</script>
</body>
</html>
